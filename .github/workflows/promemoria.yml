# Ogni ora: promemoria 24h ai pazienti + pulizia prenotazioni pending scadute.
# Chiama l'endpoint Render protetto da CRON_SECRET (dopo la migrazione da Netlify).
name: Promemoria orario
on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:
jobs:
  promemoria:
    runs-on: ubuntu-latest
    steps:
      - run: curl -sf --max-time 60 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://infermieriweb.it/api/cron/promemoria
